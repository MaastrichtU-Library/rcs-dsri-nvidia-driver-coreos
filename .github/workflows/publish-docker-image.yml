name: Publish Docker image
 
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
    - 'Dockerfile'
    - '.github/workflows/publish-docker-image.yml'
  # schedule:
    # Monday at 3:00 AM UTC
    # - cron: '0 3 * * 1'

env:
  IMAGE_ID: ghcr.io/${{github.repository_owner}}/rcs-dsri-nvidia-driver-coreos
  IMAGE_TAG: latest-centos10

jobs:
  build-and-publish-latest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to the GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
          
      - name: Set lowercase image ID
        run: |
          IMAGE_ID=$(echo '${{ env.IMAGE_ID }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_ID=$IMAGE_ID" >> $GITHUB_ENV
      
      # Cache: https://docs.docker.com/build/ci/github-actions/cache/#github-cache
      - name: Build and publish main latest Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: ./Dockerfile
          pull: true
          push: true
          tags: ${{ env.IMAGE_ID }}:${{ env.IMAGE_TAG }}
          #cache-from: type=gha
          #cache-to: type=gha,mode=max